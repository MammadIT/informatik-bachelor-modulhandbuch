<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curriculum Explorer · Informatik Bachelor · WH Gelsenkirchen</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2335;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555d72;
    --pflicht: #4f8ef7;
    --wahlpflicht: #7c3aed;
    --shadow: 0 4px 32px rgba(0,0,0,0.5);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
  }
  .header-inner {
    max-width: 1400px; margin: 0 auto;
    display: flex; align-items: center; gap: 1.5rem;
    height: 64px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.3rem; color: var(--text);
    display: flex; align-items: center; gap: .5rem;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent); }
  .search-wrap {
    flex: 1; max-width: 380px; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: .55rem 1rem .55rem 2.6rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: inherit; font-size: .9rem;
    transition: border-color .2s;
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon {
    position: absolute; left: .8rem; top: 50%; transform: translateY(-50%);
    color: var(--text3); pointer-events: none;
  }
  .filter-pills {
    display: flex; gap: .4rem; flex-wrap: wrap;
    margin-left: auto;
  }
  .pill {
    padding: .3rem .8rem; border-radius: 20px; font-size: .78rem;
    font-weight: 500; cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text2); transition: all .2s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill.active.wp { background: var(--wahlpflicht); border-color: var(--wahlpflicht); }

  /* ── HERO ── */
  .hero {
    max-width: 1400px; margin: 0 auto;
    padding: 3rem 2rem 1.5rem;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(2rem, 4vw, 3.2rem);
    line-height: 1.15;
    background: linear-gradient(135deg, #e8eaf0 30%, #4f8ef7);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: .5rem;
  }
  .hero p { color: var(--text2); font-size: 1rem; }
  .stats {
    display: flex; gap: 1.5rem; margin-top: 1.5rem; flex-wrap: wrap;
  }
  .stat { font-size: .85rem; color: var(--text2); }
  .stat strong { color: var(--accent); font-size: 1.4rem; display: block; font-weight: 600; }

  /* ── MAIN GRID ── */
  .layout { display: flex; gap: 0; max-width: 1400px; margin: 0 auto; }
  .sidebar {
    width: 240px; flex-shrink: 0;
    padding: 1.5rem 1rem 3rem;
    border-right: 1px solid var(--border);
    position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
  }
  .sidebar h3 {
    font-size: .7rem; letter-spacing: .1em; text-transform: uppercase;
    color: var(--text3); margin-bottom: .75rem; padding: 0 .5rem;
  }
  .sidebar-item {
    padding: .5rem .75rem; border-radius: 8px;
    font-size: .875rem; color: var(--text2); cursor: pointer;
    transition: all .15s; display: flex; align-items: center;
    gap: .5rem; margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--surface2); color: var(--text); }
  .sidebar-item.active { background: rgba(79,142,247,.15); color: var(--accent); }
  .sidebar-item .badge {
    margin-left: auto; font-size: .7rem; background: var(--surface2);
    border-radius: 10px; padding: 1px 6px; color: var(--text3);
  }
  .sidebar-divider { height: 1px; background: var(--border); margin: 1rem .5rem; }

  /* ── BOARD ── */
  .board { flex: 1; padding: 1.5rem 2rem 4rem; overflow-y: auto; }

  /* ── SEMESTER SECTION ── */
  .sem-section { margin-bottom: 2.5rem; }
  .sem-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1rem;
  }
  .sem-label {
    font-family: 'DM Mono', monospace; font-size: .75rem;
    font-weight: 500; padding: .2rem .7rem;
    border-radius: 4px; letter-spacing: .05em;
    background: rgba(79,142,247,.1); color: var(--accent);
    border: 1px solid rgba(79,142,247,.2);
  }
  .sem-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem; color: var(--text);
  }
  .sem-lp { font-size: .8rem; color: var(--text3); margin-left: auto; }
  .sem-line { flex: 1; height: 1px; background: var(--border); }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  /* ── COURSE CARD ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
    cursor: pointer; transition: all .2s;
    position: relative; overflow: hidden;
    animation: fadeUp .4s ease both;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(79,142,247,.12);
  }
  .card::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    border-radius: 3px 0 0 3px;
  }
  .card.pflicht::before { background: var(--pflicht); }
  .card.wahlpflicht::before { background: var(--wahlpflicht); }

  .card-top { display: flex; align-items: flex-start; gap: .75rem; margin-bottom: .75rem; }
  .card-kuerzel {
    font-family: 'DM Mono', monospace; font-size: .72rem;
    font-weight: 500; padding: .2rem .5rem;
    background: var(--surface2); border-radius: 4px;
    color: var(--text3); flex-shrink: 0; letter-spacing: .03em;
  }
  .card-badges { margin-left: auto; display: flex; gap: .3rem; align-items: center; }
  .badge-lp {
    font-size: .72rem; background: rgba(16,185,129,.1);
    color: var(--accent3); border: 1px solid rgba(16,185,129,.2);
    border-radius: 4px; padding: .1rem .4rem; font-weight: 500;
  }
  .badge-icon {
    font-size: .9rem; opacity: .7;
    title: "Hat Voraussetzungen";
  }
  .card-name {
    font-size: .95rem; font-weight: 500; line-height: 1.35;
    margin-bottom: .5rem; color: var(--text);
  }
  .card-meta { display: flex; gap: .75rem; flex-wrap: wrap; }
  .card-meta span {
    font-size: .75rem; color: var(--text3);
    display: flex; align-items: center; gap: .25rem;
  }
  .prereq-chips {
    margin-top: .75rem; display: flex; gap: .3rem; flex-wrap: wrap;
  }
  .prereq-chip {
    font-size: .68rem; font-family: 'DM Mono', monospace;
    padding: .1rem .4rem; border-radius: 3px;
    background: rgba(79,142,247,.1); color: var(--accent);
    border: 1px solid rgba(79,142,247,.15);
  }

  /* ── MODAL ── */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(5,7,12,.8); backdrop-filter: blur(4px);
    z-index: 200; align-items: flex-start; justify-content: flex-end;
  }
  .overlay.open { display: flex; }
  .drawer {
    width: min(640px, 100vw); height: 100vh;
    background: var(--surface); border-left: 1px solid var(--border);
    overflow-y: auto; display: flex; flex-direction: column;
    animation: slideIn .3s cubic-bezier(.22,1,.36,1);
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .drawer-header {
    padding: 1.5rem 1.75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--surface); z-index: 1;
  }
  .drawer-close {
    position: absolute; top: 1.25rem; right: 1.25rem;
    width: 32px; height: 32px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--surface2);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text2); transition: all .2s; font-size: 1rem;
  }
  .drawer-close:hover { border-color: var(--danger); color: var(--danger); }
  .drawer-kuerzel {
    font-family: 'DM Mono', monospace; font-size: .8rem;
    color: var(--accent); margin-bottom: .4rem; letter-spacing: .05em;
  }
  .drawer-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem; color: var(--text); line-height: 1.2;
    padding-right: 2.5rem;
  }
  .drawer-subtitle { font-size: .85rem; color: var(--text2); margin-top: .25rem; }
  .meta-row {
    display: flex; gap: .5rem; flex-wrap: wrap; margin-top: 1rem;
  }
  .meta-chip {
    display: flex; align-items: center; gap: .3rem;
    font-size: .78rem; padding: .3rem .7rem; border-radius: 20px;
    border: 1px solid var(--border); color: var(--text2);
    background: var(--surface2);
  }
  .meta-chip.hl { border-color: rgba(79,142,247,.3); color: var(--accent); background: rgba(79,142,247,.08); }
  .meta-chip.green { border-color: rgba(16,185,129,.3); color: var(--accent3); background: rgba(16,185,129,.08); }
  .meta-chip.amber { border-color: rgba(245,158,11,.3); color: var(--warn); background: rgba(245,158,11,.08); }

  .drawer-body { padding: 1.5rem 1.75rem; flex: 1; }
  .section {
    margin-bottom: 1.75rem;
  }
  .section-title {
    font-size: .7rem; text-transform: uppercase; letter-spacing: .1em;
    color: var(--text3); margin-bottom: .75rem;
    display: flex; align-items: center; gap: .5rem;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .section-content {
    font-size: .9rem; color: var(--text2); line-height: 1.65;
  }
  .content-list {
    list-style: none; display: flex; flex-direction: column; gap: .4rem;
  }
  .content-list li {
    padding: .4rem .75rem; border-radius: 6px;
    background: var(--surface2); font-size: .875rem;
    color: var(--text2); border-left: 2px solid var(--border);
    line-height: 1.4;
  }

  /* Prereq graph */
  .prereq-graph {
    display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem;
  }
  .prereq-node {
    padding: .4rem .8rem; border-radius: 8px;
    border: 1px solid rgba(79,142,247,.25);
    background: rgba(79,142,247,.07); color: var(--accent);
    font-size: .82rem; cursor: pointer;
    transition: all .2s; font-family: 'DM Mono', monospace;
    display: flex; align-items: center; gap: .4rem;
  }
  .prereq-node:hover {
    background: rgba(79,142,247,.2); transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79,142,247,.2);
  }
  .prereq-node.official { border-color: rgba(245,158,11,.3); background: rgba(245,158,11,.07); color: var(--warn); }
  .prereq-node.official:hover { background: rgba(245,158,11,.15); box-shadow: 0 4px 12px rgba(245,158,11,.15); }

  /* ── STUDIENVERLAUF SECTION ── */
  .guide-section {
    background: linear-gradient(135deg, rgba(79,142,247,.06), rgba(124,58,237,.06));
    border: 1px solid rgba(79,142,247,.15); border-radius: 16px;
    padding: 2rem; max-width: 1400px; margin: 0 auto 3rem;
    margin-left: 2rem; margin-right: 2rem;
  }
  .guide-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem; margin-bottom: 1.25rem;
    display: flex; align-items: center; gap: .75rem;
  }
  .guide-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1rem;
  }
  .guide-card {
    background: rgba(255,255,255,.03); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.25rem;
  }
  .guide-card h4 {
    font-size: .85rem; font-weight: 600; margin-bottom: .5rem;
    color: var(--text);
  }
  .guide-card p { font-size: .82rem; color: var(--text2); line-height: 1.6; }
  .guide-card .icon { font-size: 1.4rem; margin-bottom: .5rem; }

  /* ── WAHLPFLICHT BANNER ── */
  .wp-section { margin-bottom: 2.5rem; }
  .wp-header {
    display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;
  }
  .wp-label {
    font-family: 'DM Mono', monospace; font-size: .75rem;
    padding: .2rem .7rem; border-radius: 4px;
    background: rgba(124,58,237,.1); color: var(--wahlpflicht);
    border: 1px solid rgba(124,58,237,.2);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }

  /* empty state */
  .empty { text-align: center; padding: 4rem 2rem; color: var(--text3); }
  .empty span { font-size: 3rem; display: block; margin-bottom: 1rem; }

  /* mobile */
  @media (max-width: 900px) {
    .sidebar { display: none; }
    .header-inner { gap: .75rem; }
    .filter-pills { display: none; }
    .guide-section { margin-left: 1rem; margin-right: 1rem; }
    .board { padding: 1rem; }
  }
  @media (max-width: 640px) {
    .cards-grid { grid-template-columns: 1fr; }
    .stats { gap: 1rem; }
  }
</style>
</head>

// ─────────── STATE ───────────
let activeFilter = 'all';
let searchQuery = '';
let activeSidebar = 'all';

// ─────────── HELPERS ───────────
function getModule(id) { return modules.find(m => m.id === id); }

function getVisibleModules() {
  return modules.filter(m => {
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'pflicht' && m.type === 'pflicht') ||
      (activeFilter === 'wahlpflicht' && m.type === 'wahlpflicht') ||
      (activeFilter === 'hasPrereq' && (m.voraussetzungenPO.length > 0 || m.empfohleneVoraussetzungen.length > 0));
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || m.name.toLowerCase().includes(q) || m.kuerzel.toLowerCase().includes(q);
    const matchSidebar = activeSidebar === 'all' || activeSidebar === m.type ||
      (activeSidebar.startsWith('sem') && m.semester === parseInt(activeSidebar.replace('sem','')));
    return matchFilter && matchSearch && matchSidebar;
  });
}

// ─────────── STATS ───────────
function updateStats() {
  const pflicht = modules.filter(m => m.type === 'pflicht');
  document.getElementById('statTotal').textContent = modules.length;
  document.getElementById('statPflicht').textContent = pflicht.length;
  document.getElementById('statWP').textContent = modules.filter(m => m.type === 'wahlpflicht').length;
  document.getElementById('statLP').textContent = pflicht.reduce((s, m) => s + m.lp, 0);
}

// ─────────── SIDEBAR ───────────
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const sems = [...new Set(modules.map(m => m.semester))].sort((a,b)=>a-b);
  sidebar.innerHTML = `
    <h3>Ansicht</h3>
    <div class="sidebar-item active" data-sidebar="all">
      <span>🗂</span> Alle Module
      <span class="badge">${modules.length}</span>
    </div>
    <div class="sidebar-item" data-sidebar="pflicht">
      <span style="color:var(--pflicht)">●</span> Pflichtmodule
      <span class="badge">${modules.filter(m=>m.type==='pflicht').length}</span>
    </div>
    <div class="sidebar-item" data-sidebar="wahlpflicht">
      <span style="color:var(--wahlpflicht)">●</span> Wahlpflicht
      <span class="badge">${modules.filter(m=>m.type==='wahlpflicht').length}</span>
    </div>
    <div class="sidebar-divider"></div>
    <h3>Nach Semester</h3>
    ${sems.map(s => {
      const count = modules.filter(m=>m.semester===s).length;
      return `<div class="sidebar-item" data-sidebar="sem${s}">
        <span style="font-family:'DM Mono',monospace;font-size:.8rem">S${s}</span>
        ${s===4?'Sem. 4–5':'Sem. '+s}
        <span class="badge">${count}</span>
      </div>`;
    }).join('')}
  `;
  sidebar.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.sidebar-item').forEach(x => x.classList.remove('active'));
      el.classList.add('active');
      activeSidebar = el.dataset.sidebar;
      renderBoard();
    });
  });
}

// ─────────── BOARD ───────────
function renderBoard() {
  const board = document.getElementById('board');
  const visible = getVisibleModules();

  if (visible.length === 0) {
    board.innerHTML = `
      <div class="empty"><span>🔍</span>Keine Module gefunden.<br>Filter oder Suche anpassen.</div>`;
    return;
  }

  const pflichtVisible = visible.filter(m => m.type === 'pflicht');
  const wpVisible = visible.filter(m => m.type === 'wahlpflicht');

  let html = '';

  if (pflichtVisible.length > 0) {
    const sems = [...new Set(pflichtVisible.map(m => m.semester))].sort((a,b)=>a-b);
    const semLabels = {1:'Wintersemester',2:'Sommersemester',3:'Wintersemester',4:'Sommersemester',5:'Wintersemester',6:'Sommersemester'};
    sems.forEach(s => {
      const mods = pflichtVisible.filter(m => m.semester === s);
      if (mods.length === 0) return;
      const lp = mods.reduce((a,m) => a+m.lp, 0);
      html += `
        <div class="sem-section">
          <div class="sem-header">
            <div class="sem-label">SEM. ${s}</div>
            <div class="sem-title">${s===4?'4. + 5. Semester':s+'. Semester'} · ${semLabels[s]||''}</div>
            <div class="sem-line"></div>
            <div class="sem-lp">${lp} LP</div>
          </div>
          <div class="cards-grid">
            ${mods.map((m,i) => renderCard(m, i)).join('')}
          </div>
        </div>`;
    });
  }

  if (wpVisible.length > 0) {
    const sems = [...new Set(wpVisible.map(m => m.semester))].sort((a,b)=>a-b);
    html += `
      <div class="wp-section">
        <div class="wp-header">
          <div class="wp-label">WAHLPFLICHT</div>
          <div class="sem-title">Wahlpflichtmodule</div>
          <div class="sem-line"></div>
          <div class="sem-lp">${wpVisible.length} Module · ${wpVisible.reduce((a,m)=>a+m.lp,0)} LP</div>
        </div>`;
    sems.forEach(s => {
      const mods = wpVisible.filter(m => m.semester === s);
      if (mods.length === 0) return;
      html += `
        <div style="margin-bottom:1.25rem">
          <div style="font-size:.75rem;color:var(--text3);margin-bottom:.6rem;padding-left:.25rem">
            Ab ${s}. Semester empfohlen
          </div>
          <div class="cards-grid">
            ${mods.map((m,i) => renderCard(m,i)).join('')}
          </div>
        </div>`;
    });
    html += `</div>`;
  }

  // Studienverlauf guide
  html += renderGuide();

  board.innerHTML = html;

  // Animate with delays
  board.querySelectorAll('.card').forEach((card, i) => {
    card.style.animationDelay = (i * 0.04) + 's';
    card.addEventListener('click', () => openDrawer(card.dataset.id));
  });
}

function renderCard(m, i) {
  const hasOfficialPrereq = m.voraussetzungenPO.length > 0;
  const hasRecommended = m.empfohleneVoraussetzungen.length > 0;
  const prereqChips = m.empfohleneVoraussetzungen.slice(0,3).map(p =>
    `<span class="prereq-chip">${p}</span>`).join('');

  return `<div class="card ${m.type}" data-id="${m.id}">
    <div class="card-top">
      <div class="card-kuerzel">${m.kuerzel}</div>
      <div class="card-badges">
        <span class="badge-lp">${m.lp} LP</span>
        ${hasOfficialPrereq ? '<span class="badge-icon" title="Formale Voraussetzung">⚠️</span>' : ''}
        ${(!hasOfficialPrereq && hasRecommended) ? '<span class="badge-icon" title="Empfohlene Voraussetzung">💡</span>' : ''}
      </div>
    </div>
    <div class="card-name">${m.name}</div>
    <div class="card-meta">
      <span>📅 Sem. ${m.semester}</span>
      <span>🌐 ${m.sprache.split(',')[0]}</span>
    </div>
    ${prereqChips ? `<div class="prereq-chips">${prereqChips}</div>` : ''}
  </div>`;
}

// ─────────── DRAWER ───────────
function openDrawer(id) {
  const m = getModule(id);
  if (!m) return;

  document.getElementById('dKuerzel').textContent = m.kuerzel;
  document.getElementById('dName').textContent = m.name;
  document.getElementById('dSubtitle').textContent = m.subtitle || '';

  const typeLabel = m.type === 'pflicht' ? '🔵 Pflichtmodul' : '🟣 Wahlpflichtmodul';
  document.getElementById('dMeta').innerHTML = `
    <div class="meta-chip hl">📅 ${m.semester}. Semester</div>
    <div class="meta-chip green">🎓 ${m.lp} Leistungspunkte</div>
    <div class="meta-chip">${typeLabel}</div>
    <div class="meta-chip">🌐 ${m.sprache}</div>
    <div class="meta-chip amber">🗓 ${m.turnus}</div>
  `;

  const officialPrereqs = m.voraussetzungenPO.filter(p => p && p !== 'Keine' && !p.startsWith('Siehe'));
  const recPrereqs = m.empfohleneVoraussetzungen.filter(p => p);

  document.getElementById('dBody').innerHTML = `
    <!-- Überblick -->
    <div class="section">
      <div class="section-title">Überblick</div>
      <div class="section-content">
        <div style="display:flex;flex-direction:column;gap:.5rem">
          <div style="display:flex;gap:.75rem">
            <span style="color:var(--text3);min-width:80px;font-size:.8rem">Dozent</span>
            <span>${m.dozent}</span>
          </div>
          <div style="display:flex;gap:.75rem">
            <span style="color:var(--text3);min-width:80px;font-size:.8rem">Lehrform</span>
            <span>${m.lehrform}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Voraussetzungen -->
    <div class="section">
      <div class="section-title">Voraussetzungen</div>
      ${officialPrereqs.length > 0 ? `
        <div style="margin-bottom:.75rem">
          <div style="font-size:.75rem;color:var(--warn);margin-bottom:.4rem">⚠️ Formale Voraussetzungen (laut PO)</div>
          <div class="prereq-graph">
            ${officialPrereqs.map(p => {
              const mod = getModule(p);
              return `<div class="prereq-node official" data-goto="${p}" title="${mod?mod.name:p}">
                ${p} ${mod ? '→' : ''}
              </div>`;
            }).join('')}
          </div>
        </div>
      ` : '<p style="color:var(--accent3);font-size:.85rem">✓ Keine formalen Voraussetzungen</p>'}

      ${recPrereqs.length > 0 ? `
        <div style="margin-top:.75rem">
          <div style="font-size:.75rem;color:var(--text3);margin-bottom:.4rem">💡 Empfohlene Voraussetzungen</div>
          <div class="prereq-graph">
            ${recPrereqs.map(p => {
              const mod = getModule(p);
              return `<div class="prereq-node" data-goto="${p}" title="${mod?mod.name:p}">
                ${p}
              </div>`;
            }).join('')}
          </div>
        </div>
      ` : ''}
    </div>

    <!-- Lernziele -->
    <div class="section">
      <div class="section-title">Lernziele</div>
      <div class="section-content">${m.lernziele}</div>
    </div>

    <!-- Inhalte -->
    <div class="section">
      <div class="section-title">Inhalte</div>
      <ul class="content-list">
        ${m.inhalte.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>

    <!-- Prüfung -->
    <div class="section">
      <div class="section-title">Prüfung</div>
      <div class="meta-chip amber" style="display:inline-flex">📝 ${m.pruefung}</div>
    </div>

    <!-- Literatur -->
    <div class="section">
      <div class="section-title">Literatur</div>
      <div class="section-content" style="font-size:.82rem">${m.literatur}</div>
    </div>
  `;

  // Prereq node clicks
  document.querySelectorAll('.prereq-node[data-goto]').forEach(el => {
    el.addEventListener('click', () => {
      const target = el.dataset.goto;
      if (getModule(target)) openDrawer(target);
    });
  });

  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open');
}

// ─────────── INIT ───────────
document.getElementById('drawerClose').addEventListener('click', closeDrawer);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeDrawer();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderBoard();
});

document.querySelectorAll('.pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    activeFilter = pill.dataset.filter;
    renderBoard();
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

updateStats();
buildSidebar();
renderBoard();
</script>
</body>
</html>
